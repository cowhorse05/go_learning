apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: simpleapps.apps.example.com
spec:
  group: apps.example.com
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              image:
                type: string
              replicas:
                type: integer
                format: int32
              port:
                type: integer
                format: int32
            required: ["image", "replicas", "port"]
          status:
            type: object
            properties:
              readyReplicas:
                type: integer
                format: int32
              phase:
                type: string
    subresources:
      status: {}
  scope: Namespaced
  names:
    plural: simpleapps
    singular: simpleapp
    kind: SimpleApp
    shortNames:
    - sa
